name: Construire l'APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Dézipper le projet
        run: |
          ZIPFILE=$(find . -maxdepth 1 -name "*.zip" | head -n 1)
          echo "Fichier trouvé : $ZIPFILE"
          unzip -o "$ZIPFILE" -d extracted

      - name: Installer Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Installer Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Construire l'APK
        working-directory: extracted/E30App/android
        run: gradle assembleDebug

      - name: Rendre l'APK téléchargeable
        uses: actions/upload-artifact@v4
        with:
          name: FASO-AGRO-EXPRESS-APK
          path: extracted/E30App/android/app/build/outputs/apk/debug/app-debug.apk
